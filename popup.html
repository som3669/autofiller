<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg:#fff; --panel:#f5f7fb; --brd:#e6eaf2; --text:#1a1d24; --muted:#7a8296;
      --brand:#7c3aed; --brand2:#a855f7; --brand-ink:#fff; --sec:#eef1f6; --sec-ink:#2a2f3a;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#16181d; --panel:#1e2128; --brd:#2a2e37; --text:#e8eaf0; --muted:#9aa3b5;
        --brand:#a855f7; --brand2:#c084fc; --sec:#262a33; --sec-ink:#d6dae4; }
    }
    * { box-sizing:border-box; }
    body { width:280px; margin:0; padding:16px; font:13px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    header { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
    .logo { width:30px; height:30px; border-radius:8px; flex:none; background:linear-gradient(135deg,var(--brand),var(--brand2)); display:grid; place-items:center; color:#fff; font-weight:800; font-size:16px; }
    h1 { font-size:15px; margin:0; }
    .sub { font-size:11px; color:var(--muted); margin:0; }
    button { width:100%; border:0; border-radius:10px; font:600 14px system-ui,sans-serif; cursor:pointer; padding:12px; transition:filter .15s, transform .05s; }
    button:active { transform:translateY(1px); }
    .primary { background:var(--brand); color:var(--brand-ink); }
    .primary:hover { filter:brightness(1.07); }
    .sec { background:var(--sec); color:var(--sec-ink); font-size:12px; padding:9px; margin-top:8px; }
    .status { min-height:16px; font-size:12px; color:var(--brand); margin-top:10px; text-align:center; }
    .card { background:var(--panel); border:1px solid var(--brd); border-radius:10px; padding:10px 12px; margin-top:12px; font-size:12px; }
    .card b { color:var(--text); }
    .muted { color:var(--muted); }
    footer { margin-top:12px; padding-top:10px; border-top:1px solid var(--brd); text-align:center; }
    a { color:var(--brand); text-decoration:none; font-weight:500; font-size:12px; }
    a:hover { text-decoration:underline; }
    kbd { background:var(--sec); border-radius:4px; padding:1px 5px; font:11px monospace; }
  </style>
</head>
<body>
  <header>
    <div class="logo">A</div>
    <div>
      <h1>AutoFiller</h1>
      <p class="sub">One-click form filler</p>
    </div>
  </header>

  <button class="primary" id="fill">⚡ Fill this page</button>
  <div class="status" id="status">Shortcut: <kbd>Alt+Shift+F</kbd></div>

  <div class="card" id="summary"></div>

  <footer><a href="options.html" target="_blank">⚙ Edit profile & rules</a></footer>

  <script src="popup.js"></script>
</body>
</html>
